name: poolify
description: "A Swimming Pool Resort Reservation App."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  path_provider: ^2.1.2
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/startinglogo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/club.jpg
    - assets/images/double.jpg
    - assets/images/family.jpg
    - assets/images/gardentable.jpg
    - assets/images/gcashqr.jpg
    - assets/images/startinglogo.jpg
    - assets/images/poolcottage.jpg
    - assets/images/pooltable.jpg
    - assets/images/roundtable.jpg
    - assets/images/specialwooden.jpg
    - assets/images/swing.jpg
    - assets/images/veranda1.jpg
    - assets/images/veranda2.jpg
    - assets/images/veranda3.jpg
    - assets/images/veranda4.jpg
    - assets/images/viproom.jpg
    - assets/images/headlogo.jpg
    - assets/images/slide1.jpg
    - assets/images/slide2.jpg
    - assets/images/slide3.jpg
  
  # To add assets to your application, add an assets section, like this:
    

